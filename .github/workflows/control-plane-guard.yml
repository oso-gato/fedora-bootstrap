name: control-plane-guard

# The promotion gate's CI backstop. The in-box mechanical gate (the managed
# PreToolUse hook gate-push.sh + managed-settings allowManagedHooksOnly) blocks the
# genesis agent from pushing/merging main unapproved. This job is the CI-side
# backstop: it FAILS any PR touching a guardrail / control-plane file UNLESS the PR
# carries the `control-plane-approved` label — so such a change cannot land silently.
# (Server-side branch protection on main, requiring a PR + review, is the PRIMARY
# backstop — the maintainer's one-time item; this complements it.)

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  control-plane-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect control-plane / guardrail changes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Host guardrail / control-plane file globs: policy, managed-settings, the
          # promotion-gate hook, the setup orchestrators, the key-sync helper, the
          # systemd units, the container-refresh + box-rebuild machinery, CI itself.
          PATTERNS='
          ^policy/
          ^.github/workflows/
          ^systemd-units/
          (^|/)managed-settings\.json$
          (^|/)setup\.sh$
          (^|/)setup-host\.sh$
          (^|/)setup-user\.sh$
          (^|/)sync-authorized-keys\.sh$
          (^|/)container-refresh\.sh$
          (^|/)box-rebuild\.sh$
          (^|/)gate-push\.sh$
          (^|/).*\.container$
          (^|/).*sudoers.*$
          '
          ERE=$(printf '%s\n' "$PATTERNS" | sed '/^[[:space:]]*$/d' | paste -sd'|' -)
          echo "Using control-plane ERE: $ERE"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files in this PR:"; echo "$CHANGED"
          HITS=$(printf '%s\n' "$CHANGED" | grep -E "$ERE" || true)
          if [ -n "$HITS" ]; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
            { echo "files<<EOF"; echo "$HITS"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          else
            echo "touched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce the waiver label on control-plane changes
        if: steps.detect.outputs.touched == 'true'
        env:
          HAS_WAIVER: ${{ contains(github.event.pull_request.labels.*.name, 'control-plane-approved') }}
        run: |
          set -euo pipefail
          echo "::group::Control-plane / guardrail files touched by this PR"
          cat <<'FILES'
          ${{ steps.detect.outputs.files }}
          FILES
          echo "::endgroup::"
          if [ "$HAS_WAIVER" = "true" ]; then
            echo "Waiver label 'control-plane-approved' present — explicitly approved."
            exit 0
          fi
          echo "::error title=Control-plane change without waiver::This PR edits guardrail / control-plane files (above) but lacks the 'control-plane-approved' label."
          cat <<'MSG'

          ────────────────────────────────────────────────────────────────────
          CONTROL-PLANE GUARD FAILED — this PR touches a host guardrail file
          (policy/**, managed-settings.json, setup*.sh, systemd-units/**, the
          key-sync helper, the refresh/box-rebuild machinery, a Quadlet, or CI).
          Such a change MUST be STANDALONE, single-purpose, and explicitly approved:
          a maintainer reviews the isolated diff and applies 'control-plane-approved',
          then re-runs this check. No auto-bypass.
          ────────────────────────────────────────────────────────────────────
          MSG
          exit 1
