name: refresh-release

# Weekly (Fridays 19:00 US Eastern / EST = Saturday 00:00 UTC) the repo refreshes the README
# and commits only when something actually moved:
#
#   1. The release UPGRADE TARGET (Option 2 of "Fedora Cloud Update", marked "# fedora-stable")
#      — re-read from Fedora's official, Beta-safe releases.json. "Upgrade your host TO this";
#      always tracks the latest stable.
#   2. The HOSTINGER_STATUS block — STATES whether the Fedora Cloud version Hostinger currently
#      provisions (scraped token-free from their public OS help page; the API
#      /api/vps/v1/templates 401s) is the latest stable: "yes, it's the latest release — skip to
#      Day 0", or how far behind and that the upgrade must run first.
#   3. The OBJECTIVE_PIN number — the repo's VALIDATED pin, kept in lockstep with the single
#      source of truth (distrobox.ini's fedora-toolbox tag). The pin is bumped DELIBERATELY
#      (image tag + Packages re-validation) per Build Principles 1 & 3 — this job NEVER auto-jumps
#      it; instead it FLAGS in the run summary when the latest stable has moved past the pin, so
#      the bump can be made, after which this line auto-follows.
#
# Best-effort on the Hostinger scrape: if their page changes it reports "undetermined", leaves the
# status block untouched, and never fails the run.

on:
  schedule:
    # Friday 19:00 America/New_York (EST, UTC-5) = Saturday 00:00 UTC.
    # GitHub cron is UTC-only (no DST), so during US daylight time this lands at 20:00 ET.
    - cron: "0 0 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh Fedora stable + Hostinger + pin checks
        run: |
          set -euo pipefail

          # (1) Latest stable Fedora GA — bare-integer "version" only, so a "45 Beta" never wins.
          latest=$(curl -fsSL https://fedoraproject.org/releases.json \
                    | grep -oE '"version": *"[0-9]+"' | grep -oE '[0-9]+' | sort -rn | head -1)
          case "$latest" in
            ''|*[!0-9]*) echo "::error::could not detect a numeric latest Fedora release (got '$latest')"; exit 1 ;;
          esac
          echo "Latest stable Fedora = $latest"

          # (2) Hostinger's currently-provisioned Fedora Cloud version, from their public help
          # page (plain text, no token). Best-effort — empty if the page changed/blocked.
          UA='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36'
          HOST_URL='https://www.hostinger.com/support/1583571-what-are-the-available-operating-systems-for-vps-at-hostinger/'
          hv=$(curl -fsSL -m 30 -A "$UA" "$HOST_URL" 2>/dev/null \
                 | sed 's/<[^>]*>//g' \
                 | grep -oiE 'Fedora Cloud[[:space:]]*[0-9]+' \
                 | grep -oE '[0-9]+' | sort -rn | head -1 || true)

          # (3) The repo's VALIDATED pin = the distrobox.ini base-image tag (single source of
          # truth; bumped DELIBERATELY per Build Principles 1 & 3 — never auto-jumped here).
          pin=$(grep -oE 'fedora-toolbox:[0-9]+' distrobox.ini | grep -oE '[0-9]+' | head -1)

          # (4) Build the Hostinger verdict sentence — drives the README status block + the summary.
          if [ -n "$hv" ]; then
            if [ "$hv" -ge "$latest" ]; then
              status="**Hostinger's Fedora Cloud is ${hv} — yes, it's the latest release.** You can ignore the version-upgrade steps in this section and skip straight to **Day 0** below."
            else
              gap=$(( latest - hv )); step=$(( gap > 2 ? 2 : gap ))
              status="**Hostinger's Fedora Cloud is ${hv} — ${gap} release(s) behind the latest (Fedora ${latest}).** Run the version-upgrade steps in this section **before** Day 0 (Fedora jumps at most +${step} per pass)."
            fi
          else
            status=""
          fi

          # (5) State everything in the Actions run (step summary + log).
          {
            echo "## Fedora release check ($(date -u +%Y-%m-%d))"
            echo ""
            echo "- Latest stable Fedora (releases.json): **$latest**"
            if [ -n "$status" ]; then echo "- $status"
            else echo "- Hostinger version: **undetermined** (help page changed or unreachable) — README status block left unchanged."; fi
            if [ -n "$pin" ] && [ "$latest" -gt "$pin" ]; then
              echo "- **Pin bump due:** Fedora $latest is now stable but the repo is pinned to **$pin** (distrobox.ini image fedora-toolbox:$pin). Bump deliberately — update that image tag and re-validate the Packages table (Build Principles 1 & 3); the README Objective line then auto-follows."
            elif [ -n "$pin" ]; then
              echo "- Repo pinned to **Fedora Cloud Base $pin** (distrobox.ini) — current with the latest stable."
            fi
          } | tee -a "${GITHUB_STEP_SUMMARY:-/dev/stdout}"

          # (6) Keep the README current and commit only on change:
          #  - releasever upgrade target -> latest (marker "# fedora-stable")
          #  - Objective pin number      -> the distrobox.ini tag (marker "OBJECTIVE_PIN")
          #  - HOSTINGER_STATUS block    -> regenerated in place (markers preserved; idempotent)
          sed -i -E "/# fedora-stable/ s/(--releasever=)[0-9]+/\1${latest}/" README.md
          if [ -n "$pin" ]; then
            sed -i -E "/OBJECTIVE_PIN/ s/(Fedora Cloud Base )[0-9]+/\1${pin}/" README.md
          fi
          if [ -n "$status" ]; then
            awk -v repl="$status" '
              /<!-- HOSTINGER_STATUS_START/ { print; print repl; skip=1; next }
              /<!-- HOSTINGER_STATUS_END/   { skip=0 }
              skip { next }
              { print }
            ' README.md > README.md.tmp && mv README.md.tmp README.md
          fi

          if git diff --quiet -- README.md; then
            echo "README already current (latest=${latest}, Hostinger=${hv:-undetermined}, pin=${pin:-?}) — nothing to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "README: latest=${latest}, Hostinger=${hv:-unchanged}, pin=${pin:-?} (auto, weekly)"
          git push
