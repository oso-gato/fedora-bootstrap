# claudebox — the host's management workbench, declaratively defined.
# Rebuild ONLY via ./setup.sh (it re-applies the Claude policy after assemble).
# Fedora version pinned; bump deliberately per VERIFY FIRST.
[claudebox]
image=quay.io/fedora/fedora-toolbox:44
pull=true
replace=false
# Anthropic's official dnf repo must exist BEFORE package install.
# HOOK QUOTING IS LOAD-BEARING: distrobox-assemble base64-decodes each hook, joins them, and
# `eval`s the whole `distrobox create` command. Its sanitize_variable() wraps any hook string
# that contains a double quote in SINGLE quotes WITHOUT escaping the single quotes already
# inside it — so a hook mixing '...' and "..." (or any for/do/done loop) detonates the eval
# ("syntax error near unexpected token `do'"). Rule: every hook is single-quoted only, no
# double quotes, no shell keywords. Multiple simple commands -> separate lines or `;`.
pre_init_hooks=sh -c 'set -f; echo [claude-code] > /etc/yum.repos.d/claude-code.repo; echo name=Claude Code >> /etc/yum.repos.d/claude-code.repo; echo baseurl=https://downloads.claude.ai/claude-code/rpm/stable >> /etc/yum.repos.d/claude-code.repo; echo enabled=1 >> /etc/yum.repos.d/claude-code.repo; echo gpgcheck=1 >> /etc/yum.repos.d/claude-code.repo; echo gpgkey=https://downloads.claude.ai/keys/claude-code.asc >> /etc/yum.repos.d/claude-code.repo'
additional_packages=claude-code host-spawn bubblewrap socat podman git gh tmux fastfetch
# Host bridges: podman -> host engine socket; systemd tooling -> host via shims.
init_hooks=sh -c 'echo export CONTAINER_HOST=unix:///run/user/$(stat -c %u /home/* | head -1)/podman/podman.sock > /etc/profile.d/10-host-podman.sh'
init_hooks=sh -c 'ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/systemctl; ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/journalctl; ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/loginctl; ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/flatpak'
