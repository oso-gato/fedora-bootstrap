# claudebox — the host's management workbench, declaratively defined.
# Rebuild ONLY via ./setup.sh (after assemble it re-applies the host bridges + Claude policy).
# Fedora version pinned; bump deliberately per VERIFY FIRST.
[claudebox]
image=quay.io/fedora/fedora-toolbox:44
pull=true
replace=false
# Do NOT add `init=true`/`init=1`: distrobox-create gates the host /run/user/<uid> bind-mount on
# init=0, so an initful box SILENTLY drops that mount — the host podman socket vanishes from the box
# and CONTAINER_HOST breaks with no build-time error, only at the first in-box podman call.
# Anthropic's official dnf repo must exist BEFORE package install, so it lives in a pre_init_hook.
#
# HOOK QUOTING IS LOAD-BEARING AND DOUBLY-TRAPPED — keep ONLY trivial, single-quoted commands here:
#  * distrobox-assemble base64-decodes each hook, joins them, and its sanitize_variable() wraps any
#    hook containing a DOUBLE quote in single quotes WITHOUT escaping the inner single quotes — so a
#    hook mixing '...' and "..." (or any for/do/done) detonates assemble's eval ("token `do'").
#  * distrobox-create then embeds the joined INIT hooks as `-- '<hook>'` (SINGLE-quoted) and re-evals
#    the whole create command ON THE HOST (distrobox-create:1072). Any SINGLE quote in an init_hook
#    breaks out of that wrapper, so the hook body runs as the unprivileged host user — Permission
#    denied writing /etc, /usr/local/bin. (PRE-init hooks are double-quote-wrapped by create, so the
#    single quotes in the pre_init_hook below DO survive — that is why the repo write can stay here.)
# Rule: a hook here is single-quoted only, no double quotes, no shell keywords. ANYTHING needing
# redirects, symlinks, or its own quoting is applied AFTER assemble over the quote-safe
# `distrobox enter -- sudo` channel — see claudebox-init.sh (host bridges) and setup-user.sh (policy).
pre_init_hooks=sh -c 'set -f; echo [claude-code] > /etc/yum.repos.d/claude-code.repo; echo name=Claude Code >> /etc/yum.repos.d/claude-code.repo; echo baseurl=https://downloads.claude.ai/claude-code/rpm/stable >> /etc/yum.repos.d/claude-code.repo; echo enabled=1 >> /etc/yum.repos.d/claude-code.repo; echo gpgcheck=1 >> /etc/yum.repos.d/claude-code.repo; echo gpgkey=https://downloads.claude.ai/keys/claude-code.asc >> /etc/yum.repos.d/claude-code.repo'
additional_packages=claude-code host-spawn bubblewrap socat podman git gh tmux fastfetch
# NOTE: the host bridges (CONTAINER_HOST export + systemctl/journalctl/loginctl/flatpak shims) used
# to be init_hooks here. They contained single quotes + a `>` redirect and so detonated create's
# host-side eval (see above); they now live in claudebox-init.sh, applied post-assemble.
