# policy/scope.conf — R16 OPERATING SCOPE, the HOST live-gate's copy (issue #132).
#
# LOCKSTEP MIRROR of the CANONICAL fedora-dev `policy/scope.conf`
# (https://raw.githubusercontent.com/oso-gato/fedora-dev/main/policy/scope.conf). The host live-gate
# discovers `live-validate` PRs ORG-WIDE, so — like the dev side — it must act ONLY on the
# maintainer-confirmed repo set; an org-wide gate is the #165 scope leak from the host end (R16 rule 5,
# fedora-dev#167). The dev-side reader names this mirror as the intended design ("MIRRORED into
# fedora-bootstrap with the control repo's copy of scope.conf … keep in lockstep", the fleet-halt.sh /
# gh-app-provision.sh precedent). Keep this file IN LOCKSTEP with the canonical: a scope change on the
# dev side must be mirrored here (and vice versa). Read by the host `repo-scope.sh`; a repo NOT listed
# gets NO build, NO verdict — one loud skip line.
#
# GRAMMAR (identical to the canonical): one bare repo name per line (org is fixed: oso-gato). '#'
# starts a comment; blank lines ignored; a line with characters outside [A-Za-z0-9._-] is INVALID and
# IGNORED — an invalid line can only ever NARROW the effective scope, never widen it (fail toward
# NARROWER, never wider).
#
# CHANGING THIS FILE is maintainer-gated (R16 rule 3, structurally enforced by the dev-side fitness
# gate on any PR that net-ADDS a repo name to a scope.conf): a maintainer's recorded, NAME-BOUND
# confirmation on the PR — a comment whose FIRST line is exactly `CONFIRMED <repo> [<repo>…]` and
# nothing else, its author role-checked admin|maintain. REMOVING a repo needs no ceremony — narrowing
# is always safe.
#
# FAIL DIRECTION (R16 rule 4 / issue #132): if this file is UNREADABLE, the host reader denies
# everything but the apparatus's OWN two repos (fedora-dev + fedora-bootstrap) so the loop can still
# validate itself but can never wander. A READABLE but EMPTY scope denies EVERYTHING (a maintainer who
# empties the file means it).
#
# Scope is PER-OBJECTIVE, not permanent (maintainer's ruling, 2026-07-13): a repo off-limits today may
# be in scope tomorrow — amend by the rule above, never by a script default.
#
# Confirmed set (mirrors fedora-dev#167 + the 2026-07-16 per-objective enrollment, both maintainer
# CONFIRMED on the canonical). knowledge-desktop is a legitimate sibling-SESSION repo — it lives IN the
# confirmed set, so honouring this scope does NOT skip it (that is exactly why a scope set, not an
# org-wide sweep, is the right isolation).
fedora-dev
fedora-bootstrap
fedora-desktop
e2e-alpha
knowledge-desktop
